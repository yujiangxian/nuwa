<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>女娲 Nuwa</title>
    <!-- 首屏无闪烁引导脚本：在 First Paint 之前同步读取持久化主题并写 data-theme。
         解析分支与 src/lib/theme.ts 的 resolveTheme 语义严格等价（含非法值回退、
         system 取 prefers-color-scheme）。非 type="module"，确保阻塞首绘前执行。 -->
    <script>
      (function () {
        try {
          var DEFAULT = 'dark';
          var raw = localStorage.getItem('nuwa_settings');
          var theme = DEFAULT;
          if (raw) {
            var parsed = JSON.parse(raw);
            if (parsed && typeof parsed.theme === 'string') theme = parsed.theme;
          }
          var prefersDark = true;
          try {
            prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          } catch (e) { prefersDark = true; }
          var resolved;
          if (theme === 'light') resolved = 'light';
          else if (theme === 'system') resolved = prefersDark ? 'dark' : 'light';
          else resolved = 'dark'; // 'dark' 与任何非法值都回退到 dark
          document.documentElement.dataset.theme = resolved;
        } catch (e) {
          document.documentElement.dataset.theme = 'dark'; // 读取/解析异常 → 默认深色（Req 2.5）
        }
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
