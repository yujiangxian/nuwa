name: Frontend CI

on:
  push:
    paths:
      - 'app/web/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    paths:
      - 'app/web/**'
      - '.github/workflows/frontend.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/web/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
